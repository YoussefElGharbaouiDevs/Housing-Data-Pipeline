housing_profile:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "housing.duckdb"
      extensions:
        - httpfs
        - postgres
      settings:
        s3_endpoint: "minio:9000"
        s3_access_key_id: "minioadmin"
        s3_secret_access_key: "minioadmin"
        s3_use_ssl: "false"
        s3_url_style: "path"
      attach:
        - alias: pg
          type: postgres
          path: "dbname=datawarehouse user=airflow password=airflow host=postgres"
